name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build JS packages
        run: |
          pnpm --filter @goalos/core build
          pnpm --filter goalos build
          pnpm --filter @goalos/mcp-server build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Build Python package
        working-directory: packages/goalos-py
        run: uv run --with build python -m build

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goalos-py-dist
          path: packages/goalos-py/dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: packages/goalos-py/dist/*

  publish-npm:
    name: Publish npm packages
    needs: build
    if: ${{ secrets.NPM_TOKEN != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build JS packages
        run: |
          pnpm --filter @goalos/core build
          pnpm --filter goalos build
          pnpm --filter @goalos/mcp-server build

      - name: Publish @goalos/core
        working-directory: packages/goalos-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --no-git-checks

      - name: Publish goalos CLI
        working-directory: packages/goalos-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --no-git-checks

      - name: Publish @goalos/mcp-server
        working-directory: packages/goalos-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --no-git-checks

  publish-pypi:
    name: Publish Python package
    needs: build
    if: ${{ secrets.PYPI_API_TOKEN != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Build Python package
        working-directory: packages/goalos-py
        run: uv run --with build python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: packages/goalos-py/dist
